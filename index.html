<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Spin & Win</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:#0A0A0A;color:#fff}
.page-wrap{max-width:430px;margin:auto;padding:20px;text-align:center}
.spin-btn,.claim-btn{
  background:linear-gradient(135deg,#0f9d58,#0b7a43);
  color:#fff;
  padding:18px;
  border-radius:12px;
  text-decoration:none;
  font-weight:900;
  display:inline-block;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="page-wrap">

  <h1>Spin & Win PKR 100,000</h1>

  <button class="spin-btn" onclick="spinWheel()">🎰 SPIN NOW</button>

</div>

<div class="win-overlay" id="winOverlay">
  <div class="win-card">
    <h2>Congratulations!</h2>
    <div class="win-amount">PKR 100,000</div>

    <a href="https://tapmad.gotrackier.com/click?campaign_id=119&pub_id=151" 
       class="claim-btn" 
       id="claimBtn">
       CLAIM YOUR REWARD →
    </a>

  </div>
</div>

<script>
function spinWheel(){
  document.getElementById("winOverlay").style.display="block";
}
</script>

<script src="//tapmad.gotrackier.com/js/prelander.js"></script>

</body>
</html>
